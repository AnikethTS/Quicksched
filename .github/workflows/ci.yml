name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang libbpf-dev libncurses-dev
          sudo apt-get install -y linux-tools-$(uname -r) 2>/dev/null || \
          sudo apt-get install -y linux-tools-generic

      - name: Show environment
        run: |
          echo "Kernel: $(uname -r)  Arch: $(uname -m)"
          clang --version | head -1
          bpftool version 2>/dev/null || true

      - name: Check sched_ext support
        id: scx
        run: |
          if bpftool btf dump file /sys/kernel/btf/vmlinux format c 2>/dev/null \
              | grep -q 'sched_ext_ops'; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "sched_ext BTF found — full build will run"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Kernel $(uname -r) has no sched_ext BTF; requires kernel >= 6.12"
          fi

      - name: Full build
        if: steps.scx.outputs.available == 'true'
        run: make

      - name: Verify binary
        if: steps.scx.outputs.available == 'true'
        run: |
          test -f scx_snap
          file scx_snap

      - name: Source compiles (fallback — no sched_ext kernel)
        if: steps.scx.outputs.available == 'false'
        run: |
          echo "Skipping BPF build — sched_ext not available on this runner"
          echo "Full build requires a kernel >= 6.12 with CONFIG_SCHED_CLASS_EXT=y"
